<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sree Electricals &amp; Electronics</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    // ── IMMEDIATE AUTH GUARD — fires before any DOM renders ──
    // Pure localStorage check — no network call, no flicker, no loop.
    // If no token → go to login. If token exists → page loads normally.
    (function(){
      if (!localStorage.getItem('authToken')) {
        window.location.replace('/login.html');
      }
    })();
  </script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Poppins',sans-serif; background:#fff8f0; min-height:100vh; }

    .navbar {
      background:linear-gradient(135deg,#ff6b35 0%,#f7931e 50%,#ffcd3c 100%);
      color:white; padding:0 32px; height:60px;
      display:flex; justify-content:space-between; align-items:center;
      box-shadow:0 4px 16px rgba(255,107,53,0.35);
    }
    .navbar h1 { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; letter-spacing:0.5px; text-shadow:0 1px 3px rgba(0,0,0,0.15); }
    .nav-right { display:flex; align-items:center; gap:14px; }
    .user-chip { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.18); border:1px solid rgba(255,255,255,0.4); border-radius:24px; padding:5px 14px 5px 8px; }
    .user-avatar { width:30px; height:30px; border-radius:50%; background:white; display:flex; align-items:center; justify-content:center; font-size:16px; }
    .user-name { font-size:13px; font-weight:600; color:white; max-width:140px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .billing-badge { background:rgba(255,255,255,0.25); border:1px solid rgba(255,255,255,0.5); border-radius:12px; padding:3px 10px; font-size:11px; font-weight:600; color:white; letter-spacing:0.5px; }
    .logout-btn { background:rgba(255,255,255,0.2); color:white; border:1px solid rgba(255,255,255,0.5); padding:8px 22px; border-radius:8px; cursor:pointer; font-size:13px; font-weight:500; font-family:'Poppins',sans-serif; transition:all 0.2s; }
    .logout-btn:hover { background:rgba(255,255,255,0.35); }

    .content { max-width:1200px; margin:28px auto; padding:0 20px; }

    .table-card { background:white; border-radius:16px; box-shadow:0 4px 24px rgba(255,107,53,0.12); overflow:hidden; border:1px solid #ffe0c0; }

    table { width:100%; border-collapse:collapse; }
    thead th { background:linear-gradient(135deg,#ff6b35,#f7931e); color:white; padding:13px 12px; font-size:12px; font-weight:600; font-family:'Poppins',sans-serif; letter-spacing:0.3px; text-align:left; white-space:nowrap; }
    thead th:first-child { width:52px; text-align:center; }

    tbody tr { border-bottom:1px solid #fff3e8; transition:background 0.12s; }
    tbody tr:nth-child(even) { background:#fffaf5; }
    tbody tr:hover { background:#fff3e0; }
    tbody tr:last-child { border-bottom:none; }
    tbody td { padding:4px 8px; font-size:13px; color:#5a3010; vertical-align:middle; }
    tbody td:first-child { text-align:center; color:#c49a72; font-size:12px; }

    .cell-input {
      width:100%; border:1px solid transparent; border-radius:7px;
      padding:6px 8px; font-size:13px; font-family:'Poppins',sans-serif;
      background:transparent; color:#3e1c00; outline:none;
      transition:border 0.15s,background 0.15s;
    }
    .cell-input:hover { border-color:#ffb74d; background:#fff8f0; }
    .cell-input:focus { border-color:#ff6b35; background:white; box-shadow:0 0 0 3px rgba(255,107,53,0.1); }
    .cell-input.center { text-align:center; }
    .cell-input.right  { text-align:right; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; }
    input[type=number] { -moz-appearance:textfield; }

    /* Product autocomplete */
    .product-wrap { position:relative; }
    .dropdown-list {
      position:absolute; top:100%; left:0; right:0; z-index:200;
      background:white; border:1.5px solid #ffb74d; border-radius:8px;
      box-shadow:0 8px 24px rgba(255,107,53,0.18); max-height:200px; overflow-y:auto;
      display:none;
    }
    .dropdown-list.open { display:block; }
    .dropdown-item {
      padding:9px 12px; cursor:pointer; font-size:13px; color:#3e1c00;
      border-bottom:1px solid #fff3e8; transition:background 0.1s;
      display:flex; flex-direction:column; gap:2px;
    }
    .dropdown-item:last-child { border-bottom:none; }
    .dropdown-item:hover, .dropdown-item.focused { background:#fff3e0; }
    .dropdown-item .di-name { font-weight:600; color:#bf360c; }
    .dropdown-item .di-sub  { font-size:11px; color:#a06040; }
    .dropdown-no-result { padding:10px 12px; color:#c49a72; font-size:13px; font-style:italic; }

    .total-display { padding:6px 8px; font-size:13px; font-weight:600; color:#e65100; background:#fff3e0; border-radius:7px; text-align:right; min-height:34px; display:flex; align-items:center; justify-content:flex-end; }

    tfoot td { background:linear-gradient(135deg,#fff3e0,#ffe0b2); padding:13px 12px; font-weight:700; font-size:14px; color:#bf360c; border-top:2px solid #ffb74d; font-family:'Playfair Display',serif; }
    tfoot td:last-child { text-align:right; font-size:15px; }

    /* Eye icon cell */
    .eye-cell { text-align:center !important; }
    .eye-btn { background:none; border:none; cursor:pointer; font-size:20px; padding:4px 6px; border-radius:6px; transition:background 0.15s; line-height:1; }
    .eye-btn:hover { background:#fff3e0; }

    .paginator { display:flex; justify-content:center; align-items:center; gap:6px; padding:14px 24px; border-top:1px solid #ffe0c0; background:#fffaf5; }
    .page-btn { width:36px; height:36px; border-radius:8px; border:1px solid #ffb74d; background:white; color:#e65100; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center; font-family:'Poppins',sans-serif; }
    .page-btn:hover { background:#fff3e0; border-color:#ff6b35; }
    .page-btn.active { background:linear-gradient(135deg,#ff6b35,#f7931e); color:white; border-color:#ff6b35; }

    .bottom-actions { display:flex; justify-content:flex-end; gap:10px; padding:14px 24px; border-top:1px solid #ffe0c0; background:#fffaf5; }
    .btn-save { background:linear-gradient(135deg,#ff6b35,#f7931e); color:white; border:none; padding:10px 28px; border-radius:8px; cursor:pointer; font-size:14px; font-weight:600; font-family:'Poppins',sans-serif; box-shadow:0 4px 14px rgba(255,107,53,0.35); transition:all 0.2s; }
    .btn-save:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(255,107,53,0.45); }
    .btn-clear { background:white; color:#e65100; border:1.5px solid #ff9800; padding:10px 24px; border-radius:8px; cursor:pointer; font-size:14px; font-weight:500; font-family:'Poppins',sans-serif; transition:all 0.2s; }
    .btn-clear:hover { background:#fff3e0; }

    .toast { position:fixed; bottom:28px; right:28px; background:linear-gradient(135deg,#ff6b35,#f7931e); color:white; padding:12px 24px; border-radius:10px; font-size:14px; font-weight:500; font-family:'Poppins',sans-serif; opacity:0; transform:translateY(10px); transition:all 0.3s; pointer-events:none; z-index:999; box-shadow:0 4px 20px rgba(255,107,53,0.4); }
    .toast.show { opacity:1; transform:translateY(0); }
  </style>
</head>
<body>

<div class="navbar">
  <h1>Sree Electricals &amp; Electronics</h1>
  <div class="nav-right">
    <div class="user-chip">
      <div class="user-avatar">👤</div>
      <span class="user-name" id="navUsername">—</span>
    </div>
    <span class="billing-badge" id="billingBadge">—</span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="content">
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Sl.No</th>
          <th>Product</th>
          <th style="width:130px">Company</th>
          <th style="width:80px;text-align:center">Quantity</th>
          <th style="width:110px;text-align:center">Year W/G</th>
          <th style="width:110px;text-align:right">Price (₹)</th>
          <th style="width:120px;text-align:right">Total (₹)</th>
          <th style="width:50px;text-align:center" id="eyeColHeader"></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
      <tfoot>
        <tr>
          <td colspan="6">Grand Total</td>
          <td id="grandTotal">₹ 0.00</td>
          <td></td>
        </tr>
      </tfoot>
    </table>
    <div class="paginator" id="paginator"></div>
    <div class="bottom-actions">
      <button class="btn-clear" onclick="clearAll()">Clear All</button>
      <button class="btn-save"  onclick="saveData()">Save &amp; Preview Bill</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Read auth info from localStorage ──
  const authToken   = localStorage.getItem('authToken');
  const billingType = localStorage.getItem('billingType') || 'billing';
  const isElite     = billingType === 'elite';

  // Show user info
  document.getElementById('navUsername').textContent = localStorage.getItem('authUser') || 'User';
  document.getElementById('billingBadge').textContent = isElite ? '👑 Elite Billing' : '🧾 Billing';

  // Show eye icon column header only for elite
  if (isElite) {
    document.getElementById('eyeColHeader').textContent = '👁';
  }

  // ── TABLE DATA ──
  const ROWS_PER_PAGE = 10;
  const TOTAL_PAGES   = 5;
  const TOTAL_ROWS    = ROWS_PER_PAGE * TOTAL_PAGES;
  let currentPage = 1;
  let allData = Array.from({length:TOTAL_ROWS}, ()=>({
    product:'', company:'', qty:'', warranty:'', guarantee:'', price:''
  }));

  // ── PRODUCT AUTOCOMPLETE STATE ──
  let dropdownTimers = {};
  let activeDropdown = null;

  function buildTable() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    const start = (currentPage-1)*ROWS_PER_PAGE;
    for(let i=start; i<start+ROWS_PER_PAGE; i++){
      const r = allData[i];
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${i+1}</td>
        <td>
          <div class="product-wrap" id="pw_${i}">
            <input class="cell-input" type="text" id="product_${i}"
              placeholder="Search product…" value="${esc(r.product)}"
              oninput="onProductInput(${i})"
              onkeydown="onProductKey(event,${i})"
              onfocus="onProductFocus(${i})"
              onblur="onProductBlur(${i})"
              autocomplete="off"/>
            <div class="dropdown-list" id="dd_${i}"></div>
          </div>
        </td>
        <td><input class="cell-input" type="text" id="company_${i}" placeholder="Company" value="${esc(r.company)}" oninput="updateField(${i},'company')"/></td>
        <td><input class="cell-input center" type="number" id="qty_${i}" placeholder="0" min="0" value="${r.qty}" oninput="updateField(${i},'qty');recalc(${i})"/></td>
        <td>
          <div style="display:flex;gap:4px;align-items:center">
            <input class="cell-input center" type="number" id="warranty_${i}" placeholder="W" min="0" value="${r.warranty}" oninput="updateField(${i},'warranty')" style="width:48%"/>
            <span style="color:#c49a72;font-size:11px">/</span>
            <input class="cell-input center" type="number" id="guarantee_${i}" placeholder="G" min="0" value="${r.guarantee}" oninput="updateField(${i},'guarantee')" style="width:48%"/>
          </div>
        </td>
        <td><input class="cell-input right" type="number" id="price_${i}" placeholder="0.00" min="0" step="0.01" value="${r.price}" oninput="updateField(${i},'price');recalc(${i})"/></td>
        <td><div class="total-display" id="total_${i}">${calcRowTotal(i)}</div></td>
        <td class="eye-cell">${isElite ? `<button class="eye-btn" title="View customer history" onclick="goHistory()">👁</button>` : ''}</td>`;
      tbody.appendChild(tr);
    }
    buildPaginator();
    calcGrandTotal();
  }

  function esc(v){ return String(v||'').replace(/"/g,'&quot;'); }

  function calcRowTotal(i){
    const qty   = parseFloat(allData[i].qty)   || 0;
    const price = parseFloat(allData[i].price) || 0;
    return (qty>0 && price>0) ? '₹ '+(qty*price).toFixed(2) : '—';
  }

  function updateField(i, field){
    const el = document.getElementById(`${field}_${i}`);
    if(el) allData[i][field] = el.value;
  }

  function recalc(i){
    updateField(i,'qty'); updateField(i,'price');
    const el = document.getElementById(`total_${i}`);
    if(el) el.textContent = calcRowTotal(i);
    calcGrandTotal();
  }

  function calcGrandTotal(){
    let grand = 0;
    allData.forEach(r=>{ grand += (parseFloat(r.qty)||0)*(parseFloat(r.price)||0); });
    document.getElementById('grandTotal').textContent = '₹ '+grand.toFixed(2);
  }

  // ── PRODUCT AUTOCOMPLETE ──
  function onProductInput(i){
    updateField(i,'product');
    const val = allData[i].product.trim();
    clearTimeout(dropdownTimers[i]);
    if(val.length < 1){ closeDropdown(i); return; }
    dropdownTimers[i] = setTimeout(()=> fetchProducts(i, val), 250);
  }

  function onProductFocus(i){
    const val = allData[i].product.trim();
    if(val.length >= 1) fetchProducts(i, val);
  }

  function onProductBlur(i){
    // Delay so click on dropdown item fires first
    setTimeout(()=> closeDropdown(i), 200);
  }

  function onProductKey(e, i){
    const dd = document.getElementById(`dd_${i}`);
    const items = dd.querySelectorAll('.dropdown-item');
    let focused = dd.querySelector('.dropdown-item.focused');
    if(e.key === 'ArrowDown'){
      e.preventDefault();
      const next = focused ? focused.nextElementSibling : items[0];
      if(next && next.classList.contains('dropdown-item')){ if(focused) focused.classList.remove('focused'); next.classList.add('focused'); }
    } else if(e.key === 'ArrowUp'){
      e.preventDefault();
      const prev = focused ? focused.previousElementSibling : null;
      if(prev && prev.classList.contains('dropdown-item')){ focused.classList.remove('focused'); prev.classList.add('focused'); }
    } else if(e.key === 'Enter'){
      if(focused){ focused.click(); e.preventDefault(); }
    } else if(e.key === 'Escape'){
      closeDropdown(i);
    }
  }

  async function fetchProducts(i, search){
    try{
      const resp = await fetch(`/products?search=${encodeURIComponent(search)}`, {
        headers:{ 'Authorization': authToken }
      });
      const data = await resp.json();
      renderDropdown(i, data);
    }catch(e){ closeDropdown(i); }
  }

  function renderDropdown(i, products){
    const dd = document.getElementById(`dd_${i}`);
    if(!dd) return;
    dd.innerHTML = '';
    if(!products || products.length === 0){
      dd.innerHTML = '<div class="dropdown-no-result">No products found</div>';
      dd.classList.add('open');
      return;
    }
    products.forEach(p=>{
      const item = document.createElement('div');
      item.className = 'dropdown-item';
      item.innerHTML = `
        <span class="di-name">${p.name}</span>
        <span class="di-sub">${p.company||''} ${p.price ? '· ₹'+parseFloat(p.price).toFixed(2) : ''} ${p.warranty ? '· W:'+p.warranty+'yr' : ''} ${p.guarantee ? '· G:'+p.guarantee+'yr' : ''}</span>`;
      item.onmousedown = ()=> selectProduct(i, p);
      dd.appendChild(item);
    });
    dd.classList.add('open');
    activeDropdown = i;
  }

  function selectProduct(i, p){
    allData[i].product   = p.name     || '';
    allData[i].company   = p.company  || '';
    allData[i].price     = p.price    || '';
    allData[i].warranty  = p.warranty || '';
    allData[i].guarantee = p.guarantee|| '';
    // Update DOM inputs
    const fields = ['product','company','price','warranty','guarantee'];
    fields.forEach(f=>{
      const el = document.getElementById(`${f}_${i}`);
      if(el) el.value = allData[i][f];
    });
    recalc(i);
    closeDropdown(i);
    // Focus qty
    const qtyEl = document.getElementById(`qty_${i}`);
    if(qtyEl) qtyEl.focus();
  }

  function closeDropdown(i){
    const dd = document.getElementById(`dd_${i}`);
    if(dd){ dd.classList.remove('open'); dd.innerHTML=''; }
    if(activeDropdown === i) activeDropdown = null;
  }

  // ── PAGINATOR ──
  function buildPaginator(){
    const pg = document.getElementById('paginator');
    pg.innerHTML = '';
    const prev = document.createElement('button');
    prev.className='page-btn'; prev.textContent='‹'; prev.style.fontSize='18px';
    prev.onclick=()=>{ if(currentPage>1) goPage(currentPage-1); };
    pg.appendChild(prev);
    for(let p=1;p<=TOTAL_PAGES;p++){
      const btn=document.createElement('button');
      btn.className='page-btn'+(p===currentPage?' active':'');
      btn.textContent=p; btn.onclick=()=>goPage(p);
      pg.appendChild(btn);
    }
    const next=document.createElement('button');
    next.className='page-btn'; next.textContent='›'; next.style.fontSize='18px';
    next.onclick=()=>{ if(currentPage<TOTAL_PAGES) goPage(currentPage+1); };
    pg.appendChild(next);
  }

  function goPage(p){ syncCurrentPage(); currentPage=p; buildTable(); }

  function syncCurrentPage(){
    const start=(currentPage-1)*ROWS_PER_PAGE;
    for(let i=start;i<start+ROWS_PER_PAGE;i++){
      ['product','company','qty','warranty','guarantee','price'].forEach(f=>{
        const el=document.getElementById(`${f}_${i}`);
        if(el) allData[i][f]=el.value;
      });
    }
  }

  // ── SAVE ──
  function saveData(){
    syncCurrentPage();
    const filled = allData.filter(r=>r.product&&(parseFloat(r.qty)||0)>0);
    if(filled.length===0){ showToast('Please enter at least one product with quantity!'); return; }
    sessionStorage.setItem('billData', JSON.stringify(allData));
    sessionStorage.removeItem('currentBillNo'); // force fresh bill number
    window.location.href='/billing.html';
  }

  // ── CLEAR ──
  function clearAll(){
    showToast('Clearing all data…');
    setTimeout(()=>{
      allData=Array.from({length:TOTAL_ROWS},()=>({product:'',company:'',qty:'',warranty:'',guarantee:'',price:''}));
      currentPage=1; buildTable();
      document.getElementById('grandTotal').textContent='₹ 0.00';
      showToast('All data cleared!');
    },600);
  }

  // ── HISTORY (elite only) ──
  function goHistory(){
    window.location.href='/customer-history.html';
  }

  // ── LOGOUT ──
  function logout(){
    localStorage.removeItem('authToken');
    localStorage.removeItem('authUser');
    localStorage.removeItem('billingType');
    sessionStorage.clear();
    window.location.replace('/login.html');
  }

  function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2500);
  }

  buildTable();
</script>
</body>
</html>
