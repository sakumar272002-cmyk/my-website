<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sree Electricals &amp; Electronics</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Poppins',sans-serif; background:#fff8f0; min-height:100vh; }

    /* NAVBAR */
    .navbar {
      background: linear-gradient(135deg, #ff6b35 0%, #f7931e 50%, #ffcd3c 100%);
      color:white; padding:0 32px; height:60px;
      display:flex; justify-content:space-between; align-items:center;
      box-shadow:0 4px 16px rgba(255,107,53,0.35);
    }
    .navbar h1 {
      font-family:'Playfair Display',serif;
      font-size:20px; font-weight:700; letter-spacing:0.5px;
      text-shadow:0 1px 3px rgba(0,0,0,0.15);
    }
    .logout-btn {
      background:rgba(255,255,255,0.2); color:white;
      border:1px solid rgba(255,255,255,0.5);
      padding:8px 22px; border-radius:8px; cursor:pointer;
      font-size:13px; font-weight:500; font-family:'Poppins',sans-serif;
      transition:all 0.2s;
    }
    .logout-btn:hover { background:rgba(255,255,255,0.35); }

    .content { max-width:1150px; margin:32px auto; padding:0 20px; }

    /* TABLE CARD */
    .table-card {
      background:white; border-radius:16px;
      box-shadow:0 4px 24px rgba(255,107,53,0.12);
      overflow:hidden; border:1px solid #ffe0c0;
    }

    table { width:100%; border-collapse:collapse; }

    thead th {
      background:linear-gradient(135deg,#ff6b35,#f7931e);
      color:white; padding:14px 16px;
      font-size:13px; font-weight:600; font-family:'Poppins',sans-serif;
      letter-spacing:0.3px; text-align:left;
    }
    thead th:first-child  { width:70px;  text-align:center; }
    thead th:nth-child(3) { width:130px; text-align:center; }
    thead th:nth-child(4) { width:150px; text-align:right; }
    thead th:nth-child(5) { width:160px; text-align:right; }

    tbody tr { border-bottom:1px solid #fff3e8; transition:background 0.12s; }
    tbody tr:nth-child(even) { background:#fffaf5; }
    tbody tr:hover { background:#fff3e0; }
    tbody tr:last-child { border-bottom:none; }
    tbody td { padding:5px 10px; font-size:14px; color:#5a3010; }
    tbody td:first-child  { text-align:center; color:#c49a72; font-size:13px; }
    tbody td:nth-child(3) { text-align:center; }
    tbody td:nth-child(4) { text-align:right; }
    tbody td:nth-child(5) { text-align:right; }

    .cell-input {
      width:100%; border:1px solid transparent; border-radius:8px;
      padding:7px 10px; font-size:14px; font-family:'Poppins',sans-serif;
      background:transparent; color:#3e1c00; outline:none;
      transition:border 0.15s, background 0.15s;
    }
    .cell-input:hover  { border-color:#ffb74d; background:#fff8f0; }
    .cell-input:focus  { border-color:#ff6b35; background:white; box-shadow:0 0 0 3px rgba(255,107,53,0.1); }
    .cell-input.qty    { text-align:center; }
    .cell-input.price  { text-align:right; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; }
    input[type=number] { -moz-appearance:textfield; }

    .total-display {
      padding:7px 10px; font-size:14px; font-weight:600; color:#e65100;
      background:#fff3e0; border-radius:8px; text-align:right;
      min-height:36px; display:flex; align-items:center; justify-content:flex-end;
    }

    tfoot td {
      background:linear-gradient(135deg,#fff3e0,#ffe0b2);
      padding:14px 16px; font-weight:700;
      font-size:15px; color:#bf360c; border-top:2px solid #ffb74d;
      font-family:'Playfair Display',serif;
    }
    tfoot td:last-child { text-align:right; font-size:16px; }

    /* PAGINATOR */
    .paginator {
      display:flex; justify-content:center; align-items:center;
      gap:6px; padding:16px 24px; border-top:1px solid #ffe0c0;
      background:#fffaf5;
    }
    .page-btn {
      width:38px; height:38px; border-radius:8px;
      border:1px solid #ffb74d; background:white;
      color:#e65100; font-size:14px; font-weight:600;
      cursor:pointer; transition:all 0.15s;
      display:flex; align-items:center; justify-content:center;
      font-family:'Poppins',sans-serif;
    }
    .page-btn:hover   { background:#fff3e0; border-color:#ff6b35; }
    .page-btn.active  { background:linear-gradient(135deg,#ff6b35,#f7931e); color:white; border-color:#ff6b35; }
    .page-btn.arrow   { font-size:18px; }

    /* BOTTOM ACTIONS */
    .bottom-actions {
      display:flex; justify-content:flex-end; gap:10px;
      padding:16px 24px; border-top:1px solid #ffe0c0;
      background:#fffaf5;
    }

    .btn-save {
      background:linear-gradient(135deg,#ff6b35,#f7931e);
      color:white; border:none; padding:10px 28px;
      border-radius:8px; cursor:pointer; font-size:14px;
      font-weight:600; font-family:'Poppins',sans-serif;
      box-shadow:0 4px 14px rgba(255,107,53,0.35);
      transition:all 0.2s;
    }
    .btn-save:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(255,107,53,0.45); }

    .btn-clear {
      background:white; color:#e65100;
      border:1.5px solid #ff9800; padding:10px 24px;
      border-radius:8px; cursor:pointer; font-size:14px;
      font-weight:500; font-family:'Poppins',sans-serif;
      transition:all 0.2s;
    }
    .btn-clear:hover { background:#fff3e0; }

    /* TOAST */
    .toast {
      position:fixed; bottom:28px; right:28px;
      background:linear-gradient(135deg,#ff6b35,#f7931e);
      color:white; padding:12px 24px; border-radius:10px;
      font-size:14px; font-weight:500; font-family:'Poppins',sans-serif;
      opacity:0; transform:translateY(10px); transition:all 0.3s;
      pointer-events:none; z-index:999;
      box-shadow:0 4px 20px rgba(255,107,53,0.4);
    }
    .toast.show { opacity:1; transform:translateY(0); }
  </style>
</head>
<body>

<div class="navbar">
  <h1>Sree Electricals &amp; Electronics</h1>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="content">
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Sl.No</th><th>Product</th><th>Quantity</th><th>Price (₹)</th><th>Total Price (₹)</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
      <tfoot>
        <tr>
          <td colspan="4">Grand Total</td>
          <td id="grandTotal">₹ 0.00</td>
        </tr>
      </tfoot>
    </table>
    <div class="paginator" id="paginator"></div>
    <div class="bottom-actions">
      <button class="btn-clear" onclick="clearAll()">Clear All</button>
      <button class="btn-save"  onclick="saveData()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const ROWS_PER_PAGE = 10;
  const TOTAL_PAGES   = 5;
  const TOTAL_ROWS    = ROWS_PER_PAGE * TOTAL_PAGES;
  let currentPage = 1;
  let allData = Array.from({length:TOTAL_ROWS}, ()=>({product:'',qty:'',price:''}));

  function buildTable() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    const start = (currentPage-1)*ROWS_PER_PAGE;
    const end   = start+ROWS_PER_PAGE;
    for(let i=start;i<end;i++){
      const slNo=i+1; const r=allData[i];
      const tr=document.createElement('tr');
      tr.innerHTML=`
        <td>${slNo}</td>
        <td><input class="cell-input" type="text" id="product_${i}" placeholder="Enter product name" value="${r.product}" oninput="updateData(${i})"/></td>
        <td><input class="cell-input qty" type="number" id="qty_${i}" placeholder="0" min="0" value="${r.qty}" oninput="updateData(${i})"/></td>
        <td><input class="cell-input price" type="number" id="price_${i}" placeholder="0.00" min="0" step="0.01" value="${r.price}" oninput="updateData(${i})"/></td>
        <td><div class="total-display" id="total_${i}">${calcRowTotal(i)}</div></td>`;
      tbody.appendChild(tr);
    }
    buildPaginator();
    calcGrandTotal();
  }

  function calcRowTotal(i){
    const qty=parseFloat(allData[i].qty)||0;
    const price=parseFloat(allData[i].price)||0;
    return (qty>0&&price>0)?'₹ '+(qty*price).toFixed(2):'—';
  }

  function updateData(i){
    if(document.getElementById(`product_${i}`)) allData[i].product=document.getElementById(`product_${i}`).value;
    if(document.getElementById(`qty_${i}`))     allData[i].qty=document.getElementById(`qty_${i}`).value;
    if(document.getElementById(`price_${i}`))   allData[i].price=document.getElementById(`price_${i}`).value;
    const el=document.getElementById(`total_${i}`);
    if(el) el.textContent=calcRowTotal(i);
    calcGrandTotal();
  }

  function calcGrandTotal(){
    let grand=0;
    allData.forEach(r=>{
      const qty=parseFloat(r.qty)||0;
      const price=parseFloat(r.price)||0;
      grand+=qty*price;
    });
    document.getElementById('grandTotal').textContent='₹ '+grand.toFixed(2);
  }

  function buildPaginator(){
    const pg=document.getElementById('paginator');
    pg.innerHTML='';
    const prev=document.createElement('button');
    prev.className='page-btn arrow';
    prev.textContent='‹';
    prev.onclick=()=>{if(currentPage>1) goPage(currentPage-1);};
    pg.appendChild(prev);
    for(let p=1;p<=TOTAL_PAGES;p++){
      const btn=document.createElement('button');
      btn.className='page-btn'+(p===currentPage?' active':'');
      btn.textContent=p;
      btn.onclick=()=>goPage(p);
      pg.appendChild(btn);
    }
    const next=document.createElement('button');
    next.className='page-btn arrow';
    next.textContent='›';
    next.onclick=()=>{if(currentPage<TOTAL_PAGES) goPage(currentPage+1);};
    pg.appendChild(next);
  }

  function goPage(p){ syncCurrentPage(); currentPage=p; buildTable(); }

  function syncCurrentPage(){
    const start=(currentPage-1)*ROWS_PER_PAGE;
    const end=start+ROWS_PER_PAGE;
    for(let i=start;i<end;i++){
      if(document.getElementById(`product_${i}`)){
        allData[i].product=document.getElementById(`product_${i}`).value;
        allData[i].qty=document.getElementById(`qty_${i}`).value;
        allData[i].price=document.getElementById(`price_${i}`).value;
      }
    }
  }

  function saveData(){
    syncCurrentPage();
    const filledRows=allData.filter(r=>r.product||r.qty||r.price);
    if(filledRows.length===0){ showToast('Please enter at least one product!'); return; }
    sessionStorage.setItem('billData',JSON.stringify(allData));
    window.location.href='/billing.html';
  }

  function clearAll(){
    showToast('Clearing all data...');
    setTimeout(()=>{
      allData=Array.from({length:TOTAL_ROWS},()=>({product:'',qty:'',price:''}));
      currentPage=1;
      buildTable();
      document.getElementById('grandTotal').textContent='₹ 0.00';
      showToast('All data cleared!');
    },800);
  }

  function logout(){ sessionStorage.clear(); window.location.href='/login.html'; }

  function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2500);
  }

  buildTable();
</script>
</body>
</html>
