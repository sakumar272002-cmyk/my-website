<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard — Sree Electricals</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#fff8f0;min-height:100vh;display:flex;flex-direction:column;}
/* HEADER */
header{background:linear-gradient(135deg,#ff6b35,#f7931e 50%,#ffcd3c);padding:12px 28px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(255,107,53,.35);}
.logo-circle{width:40px;height:40px;background:rgba(255,255,255,.25);border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.5);}
header h1{font-family:'Playfair Display',serif;font-size:20px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.15);}
.header-right{margin-left:auto;display:flex;align-items:center;gap:14px;}
.user-badge{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:20px;padding:5px 14px;font-size:12px;color:#fff;font-weight:500;}
.billing-badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:4px 12px;font-size:11px;color:#fff;font-weight:600;letter-spacing:.5px;}
.billing-badge.elite{background:rgba(255,215,0,.3);border-color:rgba(255,215,0,.6);color:#fff3a0;}
.logout-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:6px 14px;color:#fff;font-size:12px;cursor:pointer;font-family:'Poppins',sans-serif;}
.logout-btn:hover{background:rgba(255,255,255,.25);}
/* TABS */
.tabs-bar{background:#fff;border-bottom:1px solid #fde0c0;padding:0 28px;display:flex;gap:4px;overflow-x:auto;}
.tab-btn{padding:12px 18px;font-size:13px;font-weight:500;color:#a06040;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;}
.tab-btn:hover{color:#ff6b35;}
.tab-btn.active{color:#ff6b35;border-bottom-color:#ff6b35;font-weight:600;}
/* CONTENT */
.content{flex:1;padding:24px 28px;}
.section-panel{display:none;}
.section-panel.active{display:block;}
/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.filter-bar label{font-size:12px;font-weight:600;color:#7d4e2d;text-transform:uppercase;letter-spacing:.8px;}
.filter-select{padding:8px 14px;border:1.5px solid #f0c080;border-radius:10px;font-size:13px;background:#fff;color:#3e1c00;outline:none;cursor:pointer;}
.filter-select:focus{border-color:#ff6b35;}
/* BILLING TABLE */
.table-wrap{background:#fff;border-radius:14px;border:1px solid #fde0c0;overflow:hidden;box-shadow:0 2px 12px rgba(255,107,53,.07);}
.billing-table{width:100%;border-collapse:collapse;}
.billing-table thead{background:linear-gradient(135deg,#ff6b35,#f7931e);}
.billing-table thead th{padding:12px 14px;font-size:12px;font-weight:600;color:#fff;text-align:left;white-space:nowrap;}
.billing-table tbody tr{border-bottom:1px solid #fff3e0;}
.billing-table tbody tr:last-child{border-bottom:none;}
.billing-table tbody tr:hover{background:#fffaf5;}
.billing-table td{padding:10px 14px;font-size:13px;color:#3e1c00;vertical-align:middle;}
/* PRODUCT SEARCH DROPDOWN */
.prod-cell{position:relative;min-width:220px;}
.prod-input{width:100%;padding:7px 10px;border:1.5px solid #f0c080;border-radius:8px;font-size:13px;background:#fff;color:#3e1c00;outline:none;}
.prod-input:focus{border-color:#ff6b35;}
.prod-dropdown{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid #ff9800;border-radius:8px;max-height:200px;overflow-y:auto;z-index:100;display:none;box-shadow:0 6px 20px rgba(255,107,53,.15);}
.prod-dropdown.open{display:block;}
.prod-option{padding:8px 12px;font-size:12px;cursor:pointer;color:#3e1c00;border-bottom:1px solid #fff3e0;line-height:1.4;}
.prod-option:hover{background:#fff3e0;}
.prod-option .prod-name{font-weight:600;}
.prod-option .prod-meta{color:#a06040;font-size:11px;}
/* EDITABLE CELLS */
.edit-input{width:100%;padding:6px 10px;border:1.5px solid #f0c080;border-radius:8px;font-size:13px;background:#fff;color:#3e1c00;outline:none;min-width:80px;}
.edit-input:focus{border-color:#ff6b35;}
.total-cell{font-weight:600;color:#e65100;}
/* ADD ROW + TOTALS */
.table-footer{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid #fde0c0;background:#fffaf5;}
.add-row-btn{display:flex;align-items:center;gap:6px;padding:7px 16px;background:#fff3e0;border:1.5px solid #ffcc80;border-radius:8px;font-size:13px;color:#e65100;cursor:pointer;font-weight:500;}
.add-row-btn:hover{background:#ffe0b2;}
.totals-area{text-align:right;font-size:13px;color:#7d4e2d;}
.totals-area .grand{font-size:16px;font-weight:700;color:#ff6b35;margin-top:4px;}
/* ACTION BUTTONS */
.action-bar{display:flex;gap:10px;margin-top:16px;justify-content:flex-end;flex-wrap:wrap;}
.btn{padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Poppins',sans-serif;transition:all .2s;}
.btn-primary{background:linear-gradient(135deg,#ff6b35,#f7931e);color:#fff;box-shadow:0 4px 14px rgba(255,107,53,.3);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(255,107,53,.4);}
.btn-outline{background:#fff;border:1.5px solid #f0c080;color:#e65100;}
.btn-outline:hover{background:#fff3e0;}
/* EYE ICON (Elite only) */
.eye-wrap{display:flex;align-items:center;justify-content:flex-end;margin-bottom:8px;}
.eye-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;background:#fff3e0;border:1.5px solid #ffcc80;border-radius:8px;font-size:12px;font-weight:600;color:#e65100;cursor:pointer;transition:all .2s;}
.eye-btn:hover{background:linear-gradient(135deg,#ff6b35,#f7931e);color:#fff;border-color:transparent;}
.eye-btn svg{flex-shrink:0;}
/* GST row */
.gst-row td{font-size:12px;color:#a06040;font-style:italic;}
/* DELETE row btn */
.del-btn{background:none;border:none;cursor:pointer;color:#ffb0a0;padding:4px;border-radius:6px;line-height:1;}
.del-btn:hover{color:#e53935;background:#fff0ee;}
</style>
</head>

    </div>
    <div class="table-wrap">
      <table class="billing-table">
        <thead>
          <tr>
            <th>Sl.No</th>
            <th>Product</th>
            <th>Company</th>
            <th>Quantity</th>
            <th>Year W/G</th>
            <th>Price (₹)</th>
            <th>${isElite ? '<span style="display:flex;align-items:center;gap:6px;">Total Price <button class="eye-btn" style="padding:3px 8px;font-size:11px;" onclick="goToScreenC()"><svg width="14" height="14" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z\"/><circle cx=\"12\" cy=\"12\" r=\"3\"/></svg></button></span>' : 'Total Price'}</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="rowsBody">
          ${sRows.map((r,i) => renderRow(r,i)).join('')}
        </tbody>
      </table>
      <div class="table-footer">
        <button class="add-row-btn" onclick="addRow()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Row
        </button>
        <div class="totals-area">
          <div>Subtotal: ₹${subtotal.toLocaleString('en-IN',{minimumFractionDigits:2})}</div>
          ${gstRate>0 ? `<div>GST (${gstRate}%): ₹${gstAmt.toLocaleString('en-IN',{minimumFractionDigits:2})}</div>` : ''}
          <div class="grand">Grand Total: ₹${grand.toLocaleString('en-IN',{minimumFractionDigits:2})}</div>
        </div>
      </div>
    </div>
    <div class="action-bar">
      <button class="btn btn-outline" onclick="clearAll()">Clear All</button>
      <button class="btn btn-primary" onclick="downloadPDF()">Download PDF</button>
    </div>
  `;
}

function renderRow(r, i) {
  return `
    <tr id="row-${r.id}">
      <td>${i+1}</td>
      <td class="prod-cell">
        <input class="prod-input" id="pi-${r.id}" value="${r.product}" placeholder="Search product..." oninput="filterProducts(this, '${r.id}')" autocomplete="off"/>
        <div class="prod-dropdown" id="pd-${r.id}"></div>
      </td>
      <td><input class="edit-input" style="min-width:110px" value="${r.brand}" onchange="updateField('${r.id}','brand',this.value)"/></td>
      <td><input class="edit-input" style="min-width:60px" type="number" min="1" value="${r.qty}" onchange="updateField('${r.id}','qty',+this.value)"/></td>
      <td>
        <div style="display:flex;gap:6px;min-width:130px">
          <input class="edit-input" style="width:55px" placeholder="W yrs" value="${r.warranty}" onchange="updateField('${r.id}','warranty',this.value)" title="Warranty"/>
          <input class="edit-input" style="width:55px" placeholder="G yrs" value="${r.guarantee}" onchange="updateField('${r.id}','guarantee',this.value)" title="Guarantee"/>
        </div>
      </td>
      <td><input class="edit-input" style="min-width:80px" type="number" min="0" step="0.01" value="${r.price}" onchange="updateField('${r.id}','price',+this.value)"/></td>
      <td class="total-cell">₹${(r.total||0).toLocaleString('en-IN',{minimumFractionDigits:2})}</td>
      <td><button class="del-btn" onclick="deleteRow('${r.id}')" title="Remove">✕</button></td>
    </tr>
  `;
}

// ── PRODUCT SEARCH ──
function filterProducts(input, rowId) {
  const val = input.value.toLowerCase().trim();
  const dd = document.getElementById('pd-' + rowId);
  if (!val || val.length < 2) { dd.classList.remove('open'); return; }
  const sect = activeSection;
  const matches = PRODUCTS.filter(p =>
    p.section === sect && (p.product.toLowerCase().includes(val) || p.brand.toLowerCase().includes(val))
  ).slice(0,12);
  if (!matches.length) { dd.classList.remove('open'); return; }
  dd.innerHTML = matches.map(p => `
    <div class="prod-option" onclick="selectProduct('${rowId}',${JSON.stringify(p).replace(/"/g,'&quot;')})">
      <div class="prod-name">${p.product}</div>
      <div class="prod-meta">[${p.brand}] · ₹${p.rate} · ${p.unit}</div>
    </div>
  `).join('');
  dd.classList.add('open');
}

function selectProduct(rowId, p) {
  const r = rows[activeSection].find(x => x.id == rowId);
  if (!r) return;
  r.product = p.product;
  r.brand = p.brand;
  r.price = p.rate;
  r.total = +(r.qty * p.rate).toFixed(2);
  document.getElementById('pd-' + rowId).classList.remove('open');
  renderSection();
}

document.addEventListener('click', e => {
  if (!e.target.closest('.prod-cell')) {
    document.querySelectorAll('.prod-dropdown').forEach(d => d.classList.remove('open'));
  }
});

// ── FIELD UPDATE ──
function updateField(rowId, field, val) {
  const r = rows[activeSection].find(x => x.id == rowId);
  if (!r) return;
  r[field] = val;
  if (field === 'qty' || field === 'price') r.total = +(r.qty * r.price).toFixed(2);
  renderSection();
}

function addRow() {
  rows[activeSection].push(newRow());
  renderSection();
}

function deleteRow(rowId) {
  rows[activeSection] = rows[activeSection].filter(r => r.id != rowId);
  if (!rows[activeSection].length) rows[activeSection].push(newRow());
  renderSection();
}

function clearAll() {
  rows[activeSection] = [newRow()];
  renderSection();
}

// ── PDF DOWNLOAD ──
async function downloadPDF() {
  const sRows = rows[activeSection].filter(r => r.product);
  if (!sRows.length) { alert('Add at least one product before downloading.'); return; }

  let subtotal = sRows.reduce((a,r) => a + (r.total||0), 0);
  let gstAmt = +(subtotal * gstRate / 100).toFixed(2);
  let grand = +(subtotal + gstAmt).toFixed(2);

  // For Elite billing — save to DB before downloading
  if (billingType === 'elite') {
    const custName = prompt('Customer Name (for Elite record):');
    const custPhone = prompt('Customer Phone (10 digits):');
    if (custPhone && /^[0-9]{10}$/.test(custPhone)) {
      try {
        await fetch('/save-bill', {
          method: 'POST',
          headers: { 'Content-Type':'application/json', 'authorization': token },
          body: JSON.stringify({
            phone: custPhone,
            name: custName || 'Unknown',
            section: activeSection,
            items: sRows,
            subtotal, gst: gstAmt, grand,
            billedBy: authUser
          })
        });
      } catch(e) { console.warn('Save failed', e); }
    }
  }

  // Build printable HTML
  const tableRows = sRows.map((r,i) => `
    <tr>
      <td>${i+1}</td>
      <td>${r.product}</td>
      <td>${r.brand}</td>
      <td>${r.qty}</td>
      <td>${r.warranty||'-'} / ${r.guarantee||'-'}</td>
      <td>₹${r.price.toLocaleString('en-IN',{minimumFractionDigits:2})}</td>
      <td>₹${r.total.toLocaleString('en-IN',{minimumFractionDigits:2})}</td>
    </tr>
  `).join('');

  const win = window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Invoice</title>
  <style>body{font-family:Arial,sans-serif;padding:30px;color:#222;}
  h2{color:#ff6b35;margin-bottom:4px;}
  .sub{color:#888;font-size:12px;margin-bottom:20px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{background:#ff6b35;color:#fff;padding:9px 12px;text-align:left;}
  td{padding:8px 12px;border-bottom:1px solid #f0e0d0;}
  tr:nth-child(even) td{background:#fff8f0;}
  .tot{text-align:right;margin-top:16px;font-size:14px;}
  .grand{font-size:18px;font-weight:700;color:#ff6b35;}
  </style></head><body>
  <h2>Sree Electricals &amp; Electronics</h2>
  <div class="sub">Section: ${activeSection} | Date: ${new Date().toLocaleDateString('en-IN')} | Billed by: ${authUser}</div>
  <table><thead><tr><th>Sl</th><th>Product</th><th>Company</th><th>Qty</th><th>W/G</th><th>Price</th><th>Total</th></tr></thead>
  <tbody>${tableRows}</tbody></table>
  <div class="tot">
    <div>Subtotal: ₹${subtotal.toLocaleString('en-IN',{minimumFractionDigits:2})}</div>
    ${gstRate>0?'<div>GST ('+gstRate+'%): ₹'+gstAmt.toLocaleString('en-IN',{minimumFractionDigits:2})+'</div>':''}
    <div class="grand">Grand Total: ₹${grand.toLocaleString('en-IN',{minimumFractionDigits:2})}</div>
  </div>
  <script>window.onload=()=>{window.print();}<\/script>
  </body></html>`);
  win.document.close();
}

function goToScreenC() { window.location.href = '/screenC.html'; }

function logout() {
  localStorage.removeItem('authToken');
  localStorage.removeItem('authUser');
  localStorage.removeItem('billingType');
  window.location.replace('/login.html');
}

// ── INIT ──
renderTabs();
renderSection();
</script>
</body>
</html>
