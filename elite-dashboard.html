<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Elite Dashboard — Sree Electricals</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Poppins',sans-serif; background:#fff8f0; min-height:100vh; }

    /* ── NAVBAR ── */
    .navbar {
      background: linear-gradient(135deg,#ff6b35 0%,#f7931e 55%,#ffcd3c 100%);
      height: 68px; padding: 0 28px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 4px 18px rgba(255,107,53,.35);
    }
    /* Left: logo + brand name (matches login page) */
    .navbar-left { display:flex; align-items:center; gap:12px; }
    .nav-logo {
      width:44px; height:44px; flex-shrink:0;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.45)) drop-shadow(0 0 6px rgba(255,210,50,0.5));
    }
    .brand-wrap { display:flex; flex-direction:column; gap:1px; }
    .brand-name {
      font-family:'Playfair Display',serif;
      font-size:20px; font-weight:700; line-height:1.15; letter-spacing:0.6px;
      background: linear-gradient(90deg,#fff5d6 0%,#ffe082 18%,#ffffff 35%,#ffcc44 52%,#fff5d6 68%,#ffd54f 84%,#ffffff 100%);
      background-size: 220% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3.5s linear infinite;
      filter: drop-shadow(0 2px 5px rgba(0,0,0,0.25));
    }
    @keyframes shimmer { 0%{background-position:220% center} 100%{background-position:0% center} }
    .brand-tag {
      font-size:9px; font-weight:600; letter-spacing:3px; text-transform:uppercase;
      color:#fff; text-shadow: 0 0 8px rgba(255,220,50,0.7), 0 1px 3px rgba(0,0,0,0.4);
    }

    /* Right side */
    .nav-right { display:flex; align-items:center; gap:10px; }

    /* Elite badge — bold and attractive */
    .elite-badge {
      background: linear-gradient(135deg, rgba(255,255,255,0.35), rgba(255,255,255,0.15));
      border: 2px solid rgba(255,255,255,0.8);
      border-radius: 22px; padding: 5px 16px;
      font-size: 13px; font-weight: 800;
      color: white; letter-spacing: 2px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
      box-shadow: 0 2px 12px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.4);
      display: flex; align-items: center; gap: 6px;
    }

    /* Eye icon right next to Elite badge */
    .btn-eye-nav {
      background: rgba(255,255,255,0.2); border: 1.5px solid rgba(255,255,255,0.6);
      border-radius: 50%; width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 17px; transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .btn-eye-nav:hover { background: rgba(255,255,255,0.35); transform: scale(1.1); }

    .user-chip {
      display:flex; align-items:center; gap:7px;
      background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.38);
      border-radius:24px; padding:4px 13px 4px 5px;
    }
    .user-avatar {
      width:28px; height:28px; border-radius:50%; background:white;
      display:flex; align-items:center; justify-content:center; font-size:14px;
    }
    .user-name { font-size:12px; font-weight:600; color:white; }
    .logout-btn {
      background:rgba(255,255,255,.2); color:white;
      border:1px solid rgba(255,255,255,.5);
      padding:7px 18px; border-radius:8px; cursor:pointer;
      font-size:12px; font-weight:500; font-family:'Poppins',sans-serif;
      transition:background .2s;
    }
    .logout-btn:hover { background:rgba(255,255,255,.35); }

    /* ── CONTENT ── */
    .content { max-width:1340px; margin:22px auto; padding:0 16px; }

    /* ── FILTER BAR ── */
    .filter-bar {
      background:white; border-radius:12px; padding:12px 20px;
      margin-bottom:14px; display:flex; align-items:center; gap:12px;
      flex-wrap:wrap; box-shadow:0 2px 10px rgba(255,107,53,.1);
      border:1px solid #ffe0c0;
    }
    .filter-bar label { font-size:12px; font-weight:600; color:#7d4e2d; white-space:nowrap; }
    .filter-select {
      border:1.5px solid #ffb74d; border-radius:8px; padding:7px 12px;
      font-size:13px; font-family:'Poppins',sans-serif; color:#3e1c00;
      background:#fff8f0; outline:none; cursor:pointer; min-width:210px;
      transition:border-color .2s;
    }
    .filter-select:focus { border-color:#ff6b35; box-shadow:0 0 0 3px rgba(255,107,53,.1); }

    /* ── TABLE CARD ── */
    .table-card {
      background:white; border-radius:16px;
      box-shadow:0 6px 28px rgba(255,107,53,.13);
      border:1px solid #ffe0c0; overflow:hidden;
    }
    table { width:100%; border-collapse:collapse; table-layout:fixed; }

    /* Column widths */
    col.c-sl    { width:52px; }
    col.c-prod  { width:auto; }
    col.c-comp  { width:148px; }
    col.c-qty   { width:72px; }
    col.c-wg    { width:110px; }
    col.c-price { width:118px; }
    col.c-total { width:130px; }

    thead th {
      background:linear-gradient(135deg,#ff6b35,#f7931e);
      color:white; padding:13px 9px; font-size:12px; font-weight:600;
      font-family:'Poppins',sans-serif; text-align:left; white-space:nowrap;
      border-right:1px solid rgba(255,255,255,.15);
    }
    thead th:last-child { border-right:none; }
    thead th.tc { text-align:center; }
    thead th.tr { text-align:right; }

    /* Total Price header — flex with eye icon */
    .th-total-inner {
      display:flex; align-items:center; justify-content:flex-end; gap:6px;
    }
    .btn-eye {
      background:rgba(255,255,255,.2); border:none; cursor:pointer;
      width:28px; height:28px; border-radius:7px;
      display:flex; align-items:center; justify-content:center;
      font-size:16px; transition:background .15s, transform .15s; flex-shrink:0;
    }
    .btn-eye:hover { background:rgba(255,255,255,.4); transform:scale(1.15); }

    tbody tr { border-bottom:1px solid #fff3e8; transition:background .1s; }
    tbody tr:nth-child(even) { background:#fffaf5; }
    tbody tr:hover { background:#fff3e0; }
    tbody td { padding:5px 7px; font-size:13px; color:#5a3010; overflow:hidden; }
    tbody td.tc { text-align:center; }
    tbody td.tr { text-align:right; }
    td.sl-cell { text-align:center; color:#c49a72; font-size:12px; font-weight:500; }

    /* ── GENERIC CELL INPUT ── */
    .ci {
      width:100%; border:1.5px solid transparent; border-radius:7px;
      padding:6px 8px; font-size:13px; font-family:'Poppins',sans-serif;
      background:transparent; color:#3e1c00; outline:none; transition:all .15s;
    }
    .ci:hover  { border-color:#ffb74d; background:#fff8f0; }
    .ci:focus  { border-color:#ff6b35; background:white; box-shadow:0 0 0 3px rgba(255,107,53,.1); }
    .ci.tc     { text-align:center; }
    .ci.tr     { text-align:right; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; }
    input[type=number] { -moz-appearance:textfield; }

    /* ── PRODUCT SEARCH INPUT ── */
    .prod-wrap { position:relative; }
    .prod-inp {
      width:100%; border:1.5px solid transparent; border-radius:7px;
      padding:6px 8px; font-size:13px; font-family:'Poppins',sans-serif;
      background:transparent; color:#3e1c00; outline:none; transition:all .15s;
    }
    .prod-inp:hover { border-color:#ffb74d; background:#fff8f0; }
    .prod-inp:focus { border-color:#ff6b35; background:white; box-shadow:0 0 0 3px rgba(255,107,53,.1); }

    /* ── TOTAL CELL ── */
    .total-cell {
      text-align:right; font-weight:600; color:#e65100;
      padding-right:10px; white-space:nowrap;
    }
    .total-cell.empty { color:#d8b89a; font-weight:400; }

    /* ── TFOOT ── */
    tfoot td {
      background:linear-gradient(135deg,#fff3e0,#ffe0b2);
      padding:13px 10px; font-weight:700; font-size:14px;
      color:#bf360c; border-top:2px solid #ffb74d;
      font-family:'Playfair Display',serif;
    }
    tfoot td.tr { text-align:right; font-size:15px; padding-right:12px; }

    /* ── GLOBAL DROPDOWN ── */
    #gDrop {
      position:fixed; z-index:99999; display:none;
      background:white; border:1.5px solid #ffb74d;
      border-radius:12px; box-shadow:0 12px 36px rgba(255,107,53,.25);
      max-height:280px; overflow-y:scroll; min-width:360px; overscroll-behavior:contain; -webkit-overflow-scrolling:touch; pointer-events:auto;
    }
    #gDrop.open { display:block; }

    .di {
      display:flex; align-items:center; gap:12px;
      padding:10px 14px; cursor:pointer;
      border-bottom:1px solid #fff3e8; transition:background .12s;
    }
    .di:last-child { border-bottom:none; }
    .di:hover, .di:active { background:#fff3e0; }
    .di-left { flex:1; min-width:0; }
    .di-name  { font-size:13px; font-weight:600; color:#3e1c00; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .di-brand { font-size:11px; color:#a06040; margin-top:2px; }
    .di-price {
      font-size:13px; font-weight:700; color:#e65100;
      background:#fff3e0; border-radius:6px;
      padding:4px 10px; white-space:nowrap; flex-shrink:0;
    }
    .di-msg { padding:12px 16px; font-size:12px; color:#a06040; text-align:center; }

    /* ── PAGINATOR ── */
    .paginator {
      display:flex; justify-content:center; align-items:center;
      gap:6px; padding:14px 20px;
      border-top:1px solid #ffe0c0; background:#fffaf5;
    }
    .pg-btn {
      width:36px; height:36px; border-radius:8px;
      border:1px solid #ffb74d; background:white;
      color:#e65100; font-size:13px; font-weight:600;
      cursor:pointer; font-family:'Poppins',sans-serif;
      display:flex; align-items:center; justify-content:center;
      transition:all .15s;
    }
    .pg-btn:hover  { background:#fff3e0; border-color:#ff6b35; }
    .pg-btn.active { background:linear-gradient(135deg,#ff6b35,#f7931e); color:white; border-color:#ff6b35; }

    /* ── BOTTOM ACTIONS ── */
    .bottom-actions {
      display:flex; justify-content:flex-end; gap:10px;
      padding:14px 20px; border-top:1px solid #ffe0c0; background:#fffaf5;
    }
    .btn-clear {
      background:white; color:#e65100; border:1.5px solid #ff9800;
      padding:10px 22px; border-radius:8px; cursor:pointer;
      font-size:13px; font-weight:500; font-family:'Poppins',sans-serif;
      transition:background .2s;
    }
    .btn-clear:hover { background:#fff3e0; }
    .btn-save {
      background:linear-gradient(135deg,#ff6b35,#f7931e); color:white;
      border:none; padding:10px 28px; border-radius:8px; cursor:pointer;
      font-size:13px; font-weight:600; font-family:'Poppins',sans-serif;
      box-shadow:0 4px 14px rgba(255,107,53,.35); transition:transform .2s;
    }
    .btn-save:hover { transform:translateY(-1px); }

    /* ── TOAST ── */
    .toast {
      position:fixed; bottom:24px; right:24px;
      background:linear-gradient(135deg,#ff6b35,#f7931e);
      color:white; padding:11px 22px; border-radius:10px;
      font-size:13px; font-weight:500; font-family:'Poppins',sans-serif;
      opacity:0; transform:translateY(10px); transition:all .3s;
      pointer-events:none; z-index:99998;
      box-shadow:0 4px 20px rgba(255,107,53,.4);
    }
    .toast.show { opacity:1; transform:translateY(0); }

    /* ── DB STATUS ── */
    .db-bar {
      display:flex; align-items:center; gap:8px;
      background:white; border-radius:10px; padding:7px 16px;
      margin-bottom:12px; font-size:12px; font-weight:500;
      border:1px solid #ffe0c0; box-shadow:0 2px 8px rgba(255,107,53,.07);
      color:#7d4e2d;
    }
    .db-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; background:#ccc; transition:background .3s; }
    .db-dot.on  { background:#4caf50; }
    .db-dot.off { background:#f44336; }
    .db-dot.spin { background:#ff9800; animation:blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }
  </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <!-- LEFT: Logo + Brand (same as login page) -->
  <div class="navbar-left">
    <svg class="nav-logo" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="dSphG" cx="38%" cy="32%" r="65%">
          <stop offset="0%"  stop-color="#fff8e1"/>
          <stop offset="40%" stop-color="#ffe566"/>
          <stop offset="100%" stop-color="#ffaa00"/>
        </radialGradient>
        <radialGradient id="dRingG" cx="50%" cy="50%" r="50%">
          <stop offset="70%"  stop-color="rgba(255,200,50,0.0)"/>
          <stop offset="100%" stop-color="rgba(255,200,50,0.55)"/>
        </radialGradient>
        <linearGradient id="dBoltG" x1="20%" y1="0%" x2="80%" y2="100%">
          <stop offset="0%"   stop-color="#ffffff"/>
          <stop offset="40%"  stop-color="#ffe566"/>
          <stop offset="100%" stop-color="#ffaa00"/>
        </linearGradient>
        <filter id="dSph3d" x="-25%" y="-25%" width="150%" height="150%">
          <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(0,0,0,0.55)"/>
        </filter>
        <filter id="dBoltGlow" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <circle cx="28" cy="28" r="26" fill="url(#dRingG)"/>
      <circle cx="28" cy="28" r="23" fill="url(#dSphG)" filter="url(#dSph3d)"/>
      <ellipse cx="20" cy="18" rx="8" ry="5" fill="rgba(255,255,255,0.28)" transform="rotate(-25,20,18)"/>
      <ellipse cx="34" cy="37" rx="6" ry="3.5" fill="rgba(100,150,255,0.18)" transform="rotate(20,34,37)"/>
      <path d="M32 7 L17 29 L26 29 L22 49 L39 25 L29 25 Z"
            fill="url(#dBoltG)" stroke="rgba(255,220,50,0.6)" stroke-width="0.6"
            stroke-linejoin="round" filter="url(#dBoltGlow)"/>
    </svg>
    <div class="brand-wrap">
      <span class="brand-name">Sree Electricals &amp; Electronics</span>
      <span class="brand-tag">⚡ Elite Billing Portal</span>
    </div>
  </div>

  <!-- RIGHT: Elite badge + Eye icon + User chip + Logout -->
  <div class="nav-right">
    <div class="elite-badge">👑 ELITE</div>
    <button class="btn-eye-nav" onclick="goHistory()" title="Customer Bill History">👁️</button>
    <div class="user-chip">
      <div class="user-avatar">👤</div>
      <span class="user-name" id="navUser">—</span>
    </div>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
  </div>
</div>

<div class="content">

  <!-- DB STATUS -->
  <div class="db-bar">
    <div class="db-dot spin" id="dbDot"></div>
    <span id="dbMsg">Connecting to database…</span>
  </div>

  <!-- SECTION FILTER (hidden for elite — no sections in elite_products) -->
  <div class="filter-bar" style="display:none">
    <label for="secFilter">Filter by Section:</label>
    <select class="filter-select" id="secFilter" onchange="onSectionChange()">
      <option value="">All Sections</option>
    </select>
  </div>

  <!-- TABLE -->
  <div class="table-card">
    <table>
      <colgroup>
        <col class="c-sl">
        <col class="c-prod">
        <col class="c-comp">
        <col class="c-qty">
        <col class="c-wg">
        <col class="c-price">
        <col class="c-total">
      </colgroup>
      <thead>
        <tr>
          <th class="tc">Sl.No</th>
          <th>Product</th>
          <th>Company</th>
          <th class="tc">Qty</th>
          <th class="tc">W / G</th>
          <th class="tr">Price</th>
          <th class="tr">Total Price</th>
        </tr>
      </thead>
      <tbody id="tBody"></tbody>
      <tfoot>
        <tr>
          <td colspan="6">Grand Total</td>
          <td class="tr" id="grandTotal">₹ 0.00</td>
        </tr>
      </tfoot>
    </table>
    <div class="paginator" id="pgBar"></div>
    <div class="bottom-actions">
      <button class="btn-clear" onclick="clearAll()">Clear All</button>
      <button class="btn-save"  onclick="saveBill()">Save &amp; Bill</button>
    </div>
  </div>

</div>

<!-- Floating dropdown -->
<div id="gDrop"></div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════
const TOKEN = localStorage.getItem('authToken');
if (!TOKEN) window.location.replace('/login');
document.getElementById('navUser').textContent = localStorage.getItem('authUser') || '—';
const H = { 'Content-Type':'application/json', 'Authorization': TOKEN };

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const ROWS_PER_PAGE = 10, TOTAL_PAGES = 5, TOTAL_ROWS = 50;
let page = 1;

// Each row: product, brand, qty, wg, price  (price = unit price)
let D = Array.from({length: TOTAL_ROWS}, () =>
  ({product:'', brand:'', qty:'', wg:'', price:''}));

// ═══════════════════════════════════════════════
//  DB STATUS
// ═══════════════════════════════════════════════
function dbOk(msg)  { setDb('on',  msg); }
function dbErr(msg) { setDb('off', msg); }
function setDb(cls, msg) {
  document.getElementById('dbDot').className = 'db-dot ' + cls;
  document.getElementById('dbMsg').textContent = msg;
}

// ═══════════════════════════════════════════════
//  LOAD SECTIONS (elite has no sections — just ping DB)
// ═══════════════════════════════════════════════
async function loadSections() {
  try {
    const r = await fetch('/elite-ping', { headers: H });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    dbOk('✅ Database connected — ' + data.count + ' products available');
  } catch(e) {
    dbErr('❌ DB error: ' + e.message);
  }
}

// ═══════════════════════════════════════════════
//  FETCH PRODUCTS
// ═══════════════════════════════════════════════
function onSectionChange() {
  // Close any open dropdown when section changes
  closeDrop();
}

async function fetchProds(q) {
  try {
    const params = new URLSearchParams({ search: q });
    const r = await fetch('/elite-products?' + params, { headers: H });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    return Array.isArray(data) ? data : [];
  } catch(e) { return []; }
}

// ═══════════════════════════════════════════════
//  BUILD TABLE
// ═══════════════════════════════════════════════
function buildTable() {
  const tb = document.getElementById('tBody');
  tb.innerHTML = '';
  const start = (page - 1) * ROWS_PER_PAGE;

  for (let i = start; i < start + ROWS_PER_PAGE; i++) {
    const r = D[i], sl = i + 1;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="sl-cell">${sl}</td>

      <td><div class="prod-wrap">
        <input class="prod-inp" id="pi${i}"
          placeholder="Search or type product…"
          value="${x(r.product)}"
          autocomplete="off"
          oninput="onType(${i})"
          onfocus="onFocus(${i})"
          onblur="schedClose()"
        />
      </div></td>

      <td>
        <input class="ci" id="ci${i}"
          placeholder="Company"
          value="${x(r.brand)}"
          oninput="sync(${i},'brand','ci${i}')"
        />
      </td>

      <td>
        <input class="ci tc" type="number" id="qi${i}"
          placeholder="0" min="0"
          value="${r.qty||''}"
          oninput="sync(${i},'qty','qi${i}'); calcRow(${i})"
        />
      </td>

      <td>
        <input class="ci tc" id="wi${i}"
          placeholder="e.g. 2Y / 1G"
          value="${x(r.wg)}"
          oninput="sync(${i},'wg','wi${i}')"
        />
      </td>

      <td>
        <input class="ci tr" type="number" id="pri${i}"
          placeholder="0.00" min="0" step="0.01"
          value="${r.price ? parseFloat(r.price).toFixed(2) : ''}"
          oninput="sync(${i},'price','pri${i}'); calcRow(${i})"
        />
      </td>

      <td class="total-cell ${rowTotal(i)==='—'?'empty':''}" id="tot${i}">
        ${rowTotal(i)}
      </td>
    `;
    tb.appendChild(tr);
  }
  buildPager();
  calcGrand();
}

// ═══════════════════════════════════════════════
//  DATA SYNC HELPERS
// ═══════════════════════════════════════════════
function x(s) {  // html-escape
  return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}
function sync(i, key, elId) {
  const el = document.getElementById(elId);
  if (el) D[i][key] = el.value;
}
function rowTotal(i) {
  const q = parseFloat(D[i].qty)||0, p = parseFloat(D[i].price)||0;
  return (q > 0 && p > 0) ? '₹ ' + (q*p).toFixed(2) : '—';
}
function calcRow(i) {
  const el = document.getElementById('tot'+i);
  if (!el) return;
  const t = rowTotal(i);
  el.textContent = t;
  el.className = 'total-cell' + (t==='—'?' empty':'');
  calcGrand();
}
function calcGrand() {
  let g = 0;
  D.forEach(r => { g += (parseFloat(r.qty)||0)*(parseFloat(r.price)||0); });
  document.getElementById('grandTotal').textContent = '₹ ' + g.toFixed(2);
}

// ═══════════════════════════════════════════════
//  DROPDOWN
// ═══════════════════════════════════════════════
let activeRow = -1, dbTimer = null, lastRes = [], closeTimer = null;
const gDrop = document.getElementById('gDrop');

function onFocus(i) { clearTimeout(closeTimer); activeRow = i; }

function onType(i) {
  activeRow = i;
  const el = document.getElementById('pi'+i);
  if (!el) return;
  D[i].product = el.value;           // keep manual text
  const q = el.value.trim();

  clearTimeout(dbTimer);
  if (!q) { closeDrop(); return; }

  // instant loading indicator
  dropMsg('🔍 Searching…', el);

  dbTimer = setTimeout(async () => {
    if (activeRow !== i) return;
    const el2 = document.getElementById('pi'+i);
    if (!el2) return;

    const res = await fetchProds(q);
    lastRes = res;
    if (activeRow !== i) return;
    const el3 = document.getElementById('pi'+i);
    if (!el3) return;

    if (!res.length) {
      dropMsg('No matches — you can type manually', el3);
    } else {
      renderDrop(res, el3, i);
    }
  }, 280);
}

function dropMsg(msg, inp) {
  gDrop.innerHTML = `<div class="di-msg">${msg}</div>`;
  pos(inp); gDrop.classList.add('open');
}

function renderDrop(res, inp, row) {
  gDrop.innerHTML = res.map((p, idx) => `
    <div class="di"
      onmousedown="pick(event,${row},${idx})"
      ontouchstart="pick(event,${row},${idx})">
      <div class="di-left">
        <div class="di-name">${x(p.product_name)}</div>
        <div class="di-brand">${x(p.company||'')}</div>
      </div>
      <div class="di-price">₹ ${parseFloat(p.price||0).toFixed(2)}</div>
    </div>`).join('');
  pos(inp); gDrop.classList.add('open');
}

function pos(inp) {
  const r = inp.getBoundingClientRect();
  gDrop.style.top   = (r.bottom + window.scrollY + 3)+'px';
  gDrop.style.left  = (r.left  + window.scrollX)+'px';
  gDrop.style.width = Math.max(r.width, 380)+'px';
}

function pick(e, row, idx) {
  e.preventDefault(); clearTimeout(closeTimer);
  const p = lastRes[idx]; if (!p) return;

  // Fill state
  D[row].product = p.product_name;
  D[row].company = p.company||'';
  D[row].price   = parseFloat(p.price||0);

  // Fill DOM
  const piEl  = document.getElementById('pi'+row);
  const ciEl  = document.getElementById('ci'+row);
  const priEl = document.getElementById('pri'+row);

  if (piEl)  piEl.value  = p.product_name;
  if (ciEl)  ciEl.value  = p.company||'';
  if (priEl) priEl.value = parseFloat(p.price||0).toFixed(2);

  closeDrop(); activeRow = -1;
  calcRow(row);

  // Focus qty
  const qEl = document.getElementById('qi'+row);
  if (qEl) { qEl.focus(); qEl.select(); }
}

function schedClose() {
  clearTimeout(closeTimer);
  closeTimer = setTimeout(closeDrop, 350);
}
function closeDrop() { gDrop.classList.remove('open'); gDrop.innerHTML=''; }

// Only close when scrolling OUTSIDE the dropdown (e.g. page scroll)
// Scrolling INSIDE the dropdown list must NOT close it
window.addEventListener('scroll', function(e) {
  if (gDrop.contains(e.target)) return;
  closeDrop();
}, true);
window.addEventListener('resize', closeDrop);

// ═══════════════════════════════════════════════
//  PAGINATOR
// ═══════════════════════════════════════════════
function buildPager() {
  const bar = document.getElementById('pgBar');
  bar.innerHTML = '';
  const mk = (label, fn, cls='') => {
    const b = document.createElement('button');
    b.className = 'pg-btn'+cls; b.innerHTML = label; b.onclick = fn;
    bar.appendChild(b);
  };
  mk('‹', () => page > 1 && goPage(page-1));
  for (let p = 1; p <= TOTAL_PAGES; p++) {
    const pp = p;
    mk(p, () => goPage(pp), p===page?' active':'');
  }
  mk('›', () => page < TOTAL_PAGES && goPage(page+1));
}

function snapPage() {
  const s = (page-1)*ROWS_PER_PAGE;
  for (let i = s; i < s+ROWS_PER_PAGE; i++) {
    const piEl  = document.getElementById('pi'+i);
    const ciEl  = document.getElementById('ci'+i);
    const qiEl  = document.getElementById('qi'+i);
    const wiEl  = document.getElementById('wi'+i);
    const priEl = document.getElementById('pri'+i);
    if (piEl)  D[i].product = piEl.value;
    if (ciEl)  D[i].brand   = ciEl.value;
    if (qiEl)  D[i].qty     = qiEl.value;
    if (wiEl)  D[i].wg      = wiEl.value;
    if (priEl) D[i].price   = priEl.value;
  }
}

function goPage(p) { snapPage(); page = p; buildTable(); }

// ═══════════════════════════════════════════════
//  SAVE / CLEAR
// ═══════════════════════════════════════════════
function saveBill() {
  snapPage();
  const filled = D.filter(r => r.product && (parseFloat(r.qty)||0) > 0);
  if (!filled.length) { toast('Enter at least one product!'); return; }
  // Pass brand as company key so elite-billing.html can read it
  const payload = D.map(r => ({...r, company: r.brand}));
  localStorage.setItem('eliteBillData', JSON.stringify(payload));
  window.location.href = '/elite-billing.html?token=' + encodeURIComponent(TOKEN);
}

function clearAll() {
  D = Array.from({length:TOTAL_ROWS}, () =>
    ({product:'', brand:'', qty:'', wg:'', price:''}));
  page = 1; buildTable(); toast('All rows cleared!');
}

// ═══════════════════════════════════════════════
//  NAV / TOAST
// ═══════════════════════════════════════════════
function goHistory() {
  window.location.href = '/elite-history.html?token=' + encodeURIComponent(TOKEN);
}
async function doLogout() {
  try { await fetch('/logout', { method:'POST' }); } catch(e){}
  localStorage.removeItem('authToken');
  localStorage.removeItem('authUser');
  window.location.replace('/login');
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
loadSections();
buildTable();
</script>
