<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Elite Billing — Sree Electricals</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Poppins',sans-serif;background:#fff8f0;min-height:100vh;}

    /* NAVBAR */
    .navbar{background:linear-gradient(135deg,#ff6b35 0%,#f7931e 50%,#ffcd3c 100%);color:white;padding:0 28px;height:60px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 16px rgba(255,107,53,0.35);}
    .navbar h1{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;}
    .nav-right{display:flex;align-items:center;gap:10px;}
    .elite-badge{background:rgba(255,255,255,0.22);border:1px solid rgba(255,255,255,0.5);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:600;color:white;letter-spacing:1px;}
    .user-chip{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.4);border-radius:24px;padding:4px 12px 4px 5px;}
    .user-avatar{width:28px;height:28px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;font-size:15px;}
    .user-name{font-size:12px;font-weight:600;color:white;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .logout-btn{background:rgba(255,255,255,0.2);color:white;border:1px solid rgba(255,255,255,0.5);padding:7px 18px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;font-family:'Poppins',sans-serif;transition:all 0.2s;}
    .logout-btn:hover{background:rgba(255,255,255,0.35);}

    .content{max-width:1300px;margin:24px auto;padding:0 16px;}

    /* FILTER BAR */
    .filter-bar{background:white;border-radius:12px;padding:14px 20px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 2px 12px rgba(255,107,53,0.1);border:1px solid #ffe0c0;}
    .filter-bar label{font-size:12px;font-weight:600;color:#7d4e2d;white-space:nowrap;}
    .filter-select{border:1.5px solid #ffb74d;border-radius:8px;padding:7px 12px;font-size:13px;font-family:'Poppins',sans-serif;color:#3e1c00;background:#fff8f0;outline:none;cursor:pointer;transition:all 0.2s;min-width:200px;}
    .filter-select:focus{border-color:#ff6b35;box-shadow:0 0 0 3px rgba(255,107,53,0.1);}

    /* TABLE CARD */
    .table-card{background:white;border-radius:16px;box-shadow:0 4px 24px rgba(255,107,53,0.12);overflow:hidden;border:1px solid #ffe0c0;}
    table{width:100%;border-collapse:collapse;}
    thead th{background:linear-gradient(135deg,#ff6b35,#f7931e);color:white;padding:12px 10px;font-size:12px;font-weight:600;font-family:'Poppins',sans-serif;text-align:left;white-space:nowrap;}
    thead th.center{text-align:center;}
    thead th.right{text-align:right;}
    tbody tr{border-bottom:1px solid #fff3e8;transition:background 0.1s;}
    tbody tr:nth-child(even){background:#fffaf5;}
    tbody tr:hover{background:#fff3e0;}
    tbody td{padding:6px 8px;font-size:13px;color:#5a3010;}
    tbody td.center{text-align:center;}
    tbody td.right{text-align:right;}

    /* INPUTS */
    .cell-input{width:100%;border:1px solid transparent;border-radius:7px;padding:6px 9px;font-size:13px;font-family:'Poppins',sans-serif;background:transparent;color:#3e1c00;outline:none;transition:all 0.15s;}
    .cell-input:hover{border-color:#ffb74d;background:#fff8f0;}
    .cell-input:focus{border-color:#ff6b35;background:white;box-shadow:0 0 0 3px rgba(255,107,53,0.1);}
    .cell-input.center{text-align:center;}
    .cell-input.right{text-align:right;}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
    input[type=number]{-moz-appearance:textfield;}

    /* PRODUCT SEARCH */
    .product-wrap{position:relative;}
    .product-input{width:100%;border:1px solid transparent;border-radius:7px;padding:6px 9px;font-size:13px;font-family:'Poppins',sans-serif;background:transparent;color:#3e1c00;outline:none;transition:all 0.15s;}
    .product-input:hover{border-color:#ffb74d;background:#fff8f0;}
    .product-input:focus{border-color:#ff6b35;background:white;box-shadow:0 0 0 3px rgba(255,107,53,0.1);}

    /* DROPDOWN — wider, floats over table */
    .dropdown{
      position:fixed;   /* fixed so it escapes td overflow:hidden */
      background:white;
      border:1.5px solid #ffb74d;
      border-radius:10px;
      box-shadow:0 8px 28px rgba(255,107,53,0.22);
      z-index:9999;
      max-height:240px;
      overflow-y:auto;
      display:none;
      min-width:340px;
    }
    .dropdown.show{display:block;}
    .drop-item{
      padding:10px 14px;
      cursor:pointer;
      border-bottom:1px solid #fff3e8;
      transition:background 0.12s;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .drop-item:last-child{border-bottom:none;}
    .drop-item:hover{background:#fff3e0;}
    .drop-item-left{flex:1;min-width:0;}
    .drop-name{font-size:13px;font-weight:600;color:#3e1c00;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .drop-company{font-size:11px;color:#a06040;margin-top:2px;}
    .drop-price{
      font-size:13px;font-weight:700;color:#e65100;
      background:#fff3e0;border-radius:6px;
      padding:3px 8px;white-space:nowrap;flex-shrink:0;
    }

    /* loading spinner in dropdown */
    .drop-loading{padding:12px 14px;font-size:13px;color:#a06040;text-align:center;}

    /* YEAR W/G */
    .wg-input{width:100%;border:1px solid transparent;border-radius:7px;padding:6px 9px;font-size:13px;font-family:'Poppins',sans-serif;background:transparent;color:#3e1c00;outline:none;transition:all 0.15s;}
    .wg-input:hover{border-color:#ffb74d;background:#fff8f0;}
    .wg-input:focus{border-color:#ff6b35;background:white;}

    /* TOTAL DISPLAY */
    .total-display{padding:6px 9px;font-size:13px;font-weight:600;color:#e65100;background:#fff3e0;border-radius:7px;text-align:right;min-height:34px;display:flex;align-items:center;justify-content:flex-end;}

    /* EYE ICON HEADER */
    .eye-header{display:flex;align-items:center;justify-content:flex-end;gap:6px;}
    .eye-btn-header{background:none;border:none;cursor:pointer;font-size:20px;padding:2px 4px;border-radius:6px;transition:all 0.15s;line-height:1;}
    .eye-btn-header:hover{background:rgba(255,255,255,0.3);transform:scale(1.15);}

    /* TFOOT */
    tfoot td{background:linear-gradient(135deg,#fff3e0,#ffe0b2);padding:12px 10px;font-weight:700;font-size:14px;color:#bf360c;border-top:2px solid #ffb74d;font-family:'Playfair Display',serif;}
    tfoot td.right{text-align:right;font-size:15px;}

    /* PAGINATOR */
    .paginator{display:flex;justify-content:center;align-items:center;gap:6px;padding:14px 20px;border-top:1px solid #ffe0c0;background:#fffaf5;}
    .page-btn{width:36px;height:36px;border-radius:8px;border:1px solid #ffb74d;background:white;color:#e65100;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;}
    .page-btn:hover{background:#fff3e0;border-color:#ff6b35;}
    .page-btn.active{background:linear-gradient(135deg,#ff6b35,#f7931e);color:white;border-color:#ff6b35;}

    /* BOTTOM ACTIONS */
    .bottom-actions{display:flex;justify-content:flex-end;gap:10px;padding:14px 20px;border-top:1px solid #ffe0c0;background:#fffaf5;}
    .btn-save{background:linear-gradient(135deg,#ff6b35,#f7931e);color:white;border:none;padding:10px 26px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:'Poppins',sans-serif;box-shadow:0 4px 14px rgba(255,107,53,0.35);transition:all 0.2s;}
    .btn-save:hover{transform:translateY(-1px);}
    .btn-clear{background:white;color:#e65100;border:1.5px solid #ff9800;padding:10px 22px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;font-family:'Poppins',sans-serif;transition:all 0.2s;}
    .btn-clear:hover{background:#fff3e0;}

    /* TOAST */
    .toast{position:fixed;bottom:24px;right:24px;background:linear-gradient(135deg,#ff6b35,#f7931e);color:white;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:500;font-family:'Poppins',sans-serif;opacity:0;transform:translateY(10px);transition:all 0.3s;pointer-events:none;z-index:9999;box-shadow:0 4px 20px rgba(255,107,53,0.4);}
    .toast.show{opacity:1;transform:translateY(0);}
  </style>
</head>
<body>

<div class="navbar">
  <h1>Sree Electricals &amp; Electronics</h1>
  <div class="nav-right">
    <div class="elite-badge">👑 Elite Billing</div>
    <div class="user-chip">
      <div class="user-avatar">👤</div>
      <span class="user-name" id="navUsername">—</span>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="content">
  <!-- FILTER BAR -->
  <div class="filter-bar">
    <label>Filter by Section:</label>
    <select class="filter-select" id="sectionFilter" onchange="applyFilter()">
      <option value="All">All Sections</option>
    </select>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th style="width:52px;" class="center">Sl.No</th>
          <th>Product</th>
          <th style="width:130px;">Company</th>
          <th style="width:70px;" class="center">Qty</th>
          <th style="width:110px;" class="center">Year W/G</th>
          <th style="width:110px;" class="right">Price (₹)</th>
          <th class="right" style="width:120px;">
            <div class="eye-header">
              <span>Total (₹)</span>
              <button class="eye-btn-header" onclick="goHistory()" title="Customer History">👁️</button>
            </div>
          </th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
      <tfoot>
        <tr>
          <td colspan="6">Grand Total</td>
          <td class="right" id="grandTotal">₹ 0.00</td>
        </tr>
      </tfoot>
    </table>
    <div class="paginator" id="paginator"></div>
    <div class="bottom-actions">
      <button class="btn-clear" onclick="clearAll()">Clear All</button>
      <button class="btn-save" onclick="saveData()">Save &amp; Bill</button>
    </div>
  </div>
</div>

<!-- Single floating dropdown (reused for all rows) -->
<div class="dropdown" id="globalDrop"></div>
<div class="toast" id="toast"></div>

<script>
// ── AUTH ──────────────────────────────────────────────────────────────────────
const TOKEN = localStorage.getItem('authToken');
if (!TOKEN) window.location.replace('/login.html');

document.getElementById('navUsername').textContent =
  localStorage.getItem('authUser') || '—';

const HEADERS = { 'Content-Type':'application/json', 'Authorization': TOKEN };

// ── STATE ─────────────────────────────────────────────────────────────────────
const ROWS_PER_PAGE = 10, TOTAL_PAGES = 5, TOTAL_ROWS = 50;
let currentPage = 1;
let allData = Array.from({ length: TOTAL_ROWS }, () =>
  ({ product:'', company:'', qty:'', wg:'', price:'' }));

// ── CURRENT SECTION FILTER ────────────────────────────────────────────────────
let currentSection = 'All';

// ── DROPDOWN STATE ────────────────────────────────────────────────────────────
let activeRow = -1;         // which row is currently open
let searchTimer = null;     // debounce timer
let dropResults = [];       // last fetched results

// ── LOAD SECTIONS FROM DB ─────────────────────────────────────────────────────
async function loadSections() {
  try {
    const res = await fetch('/sections', { headers: HEADERS });
    if (!res.ok) return;
    const sections = await res.json();
    const sf = document.getElementById('sectionFilter');
    sections.forEach(s => {
      const o = document.createElement('option');
      o.value = s; o.textContent = s;
      sf.appendChild(o);
    });
  } catch(e) {
    console.warn('Could not load sections:', e);
  }
}

function applyFilter() {
  currentSection = document.getElementById('sectionFilter').value;
}

// ── FETCH PRODUCTS FROM DB (debounced) ────────────────────────────────────────
async function fetchProducts(query) {
  const params = new URLSearchParams({ search: query });
  if (currentSection && currentSection !== 'All') params.append('section', currentSection);
  try {
    const res = await fetch(`/products?${params}`, { headers: HEADERS });
    if (!res.ok) return [];
    return await res.json();
  } catch(e) {
    return [];
  }
}

// ── TABLE BUILD ───────────────────────────────────────────────────────────────
function buildTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  const start = (currentPage - 1) * ROWS_PER_PAGE;

  for (let i = start; i < start + ROWS_PER_PAGE; i++) {
    const r = allData[i]; const sl = i + 1;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="center" style="color:#c49a72;font-size:12px;">${sl}</td>
      <td><div class="product-wrap">
        <input class="product-input" id="prod_${i}"
          placeholder="Search product..."
          value="${escH(r.product)}"
          autocomplete="off"
          oninput="onProductSearch(${i})"
          onblur="scheduleClose()"
          onfocus="onProdFocus(${i})"
        />
      </div></td>
      <td><input class="cell-input" id="comp_${i}" placeholder="Company"
        value="${escH(r.company)}" oninput="updateData(${i})" readonly/></td>
      <td><input class="cell-input center" type="number" id="qty_${i}"
        placeholder="0" min="0" value="${r.qty||''}" oninput="updateData(${i})"/></td>
      <td><input class="wg-input center" id="wg_${i}"
        placeholder="e.g. 2Y / 1Y" value="${escH(r.wg)}" oninput="updateData(${i})"/></td>
      <td><input class="cell-input right" type="number" id="price_${i}"
        placeholder="0.00" min="0" step="0.01" value="${r.price||''}" oninput="updateData(${i})" readonly/></td>
      <td><div class="total-display" id="total_${i}">${calcRowTotal(i)}</div></td>`;
    tbody.appendChild(tr);
  }

  buildPaginator();
  calcGrandTotal();
}

// ── PRODUCT SEARCH HANDLER ────────────────────────────────────────────────────
function onProdFocus(i) {
  activeRow = i;
}

function onProductSearch(i) {
  activeRow = i;
  const val = document.getElementById(`prod_${i}`)?.value || '';
  allData[i].product = val;

  clearTimeout(searchTimer);

  if (val.trim().length < 1) {
    hideGlobalDrop();
    return;
  }

  // Show loading state immediately
  showGlobalDropLoading(i);

  searchTimer = setTimeout(async () => {
    const results = await fetchProducts(val.trim());
    dropResults = results;

    // Make sure the same row is still active
    if (activeRow !== i) return;

    const inp = document.getElementById(`prod_${i}`);
    if (!inp) return;

    if (!results.length) {
      hideGlobalDrop();
      return;
    }

    renderGlobalDrop(i, results);
  }, 280); // 280ms debounce
}

function showGlobalDropLoading(i) {
  const inp = document.getElementById(`prod_${i}`);
  if (!inp) return;
  const drop = document.getElementById('globalDrop');
  drop.innerHTML = '<div class="drop-loading">🔍 Searching...</div>';
  positionDrop(inp);
  drop.classList.add('show');
}

function renderGlobalDrop(i, results) {
  const inp = document.getElementById(`prod_${i}`);
  if (!inp) return;
  const drop = document.getElementById('globalDrop');

  drop.innerHTML = results.map((p, idx) => `
    <div class="drop-item"
      onmousedown="selectProduct(${i}, ${idx})"
      ontouchstart="selectProduct(${i}, ${idx})">
      <div class="drop-item-left">
        <div class="drop-name">${escH(p.product)}</div>
        <div class="drop-company">${escH(p.brand || p.company || '')}</div>
      </div>
      <div class="drop-price">₹ ${parseFloat(p.price || 0).toFixed(2)}</div>
    </div>`).join('');

  positionDrop(inp);
  drop.classList.add('show');
}

function positionDrop(inp) {
  const drop = document.getElementById('globalDrop');
  const rect = inp.getBoundingClientRect();
  drop.style.top  = (rect.bottom + window.scrollY + 2) + 'px';
  drop.style.left = (rect.left + window.scrollX) + 'px';
  drop.style.width = Math.max(rect.width, 340) + 'px';
}

function hideGlobalDrop() {
  const drop = document.getElementById('globalDrop');
  drop.classList.remove('show');
  drop.innerHTML = '';
}

let closeTimer = null;
function scheduleClose() {
  clearTimeout(closeTimer);
  closeTimer = setTimeout(() => {
    hideGlobalDrop();
    activeRow = -1;
  }, 200);
}

function selectProduct(i, idx) {
  clearTimeout(closeTimer);
  const p = dropResults[idx];
  if (!p) return;

  allData[i].product = p.product;
  allData[i].company = p.brand || p.company || '';
  allData[i].price   = parseFloat(p.price || 0);

  const prodEl  = document.getElementById(`prod_${i}`);
  const compEl  = document.getElementById(`comp_${i}`);
  const priceEl = document.getElementById(`price_${i}`);

  if (prodEl)  prodEl.value  = p.product;
  if (compEl)  compEl.value  = p.brand || p.company || '';
  if (priceEl) priceEl.value = parseFloat(p.price || 0).toFixed(2);

  hideGlobalDrop();
  activeRow = -1;
  updateData(i);

  // Move focus to qty field
  const qtyEl = document.getElementById(`qty_${i}`);
  if (qtyEl) qtyEl.focus();
}

// ── DATA HELPERS ──────────────────────────────────────────────────────────────
function escH(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function updateData(i) {
  ['prod','comp','qty','wg','price'].forEach(f => {
    const el = document.getElementById(`${f}_${i}`);
    if (el) {
      const key = f === 'prod' ? 'product' : f === 'comp' ? 'company' : f;
      allData[i][key] = el.value;
    }
  });
  const el = document.getElementById(`total_${i}`);
  if (el) el.textContent = calcRowTotal(i);
  calcGrandTotal();
}

function calcRowTotal(i) {
  const qty   = parseFloat(allData[i].qty)   || 0;
  const price = parseFloat(allData[i].price) || 0;
  return (qty > 0 && price > 0) ? '₹ ' + (qty * price).toFixed(2) : '—';
}

function calcGrandTotal() {
  let g = 0;
  allData.forEach(r => { g += (parseFloat(r.qty) || 0) * (parseFloat(r.price) || 0); });
  document.getElementById('grandTotal').textContent = '₹ ' + g.toFixed(2);
}

// ── PAGINATOR ─────────────────────────────────────────────────────────────────
function buildPaginator() {
  const pg = document.getElementById('paginator');
  pg.innerHTML = '';

  const prev = document.createElement('button');
  prev.className = 'page-btn'; prev.textContent = '‹';
  prev.onclick = () => { if (currentPage > 1) goPage(currentPage - 1); };
  pg.appendChild(prev);

  for (let p = 1; p <= TOTAL_PAGES; p++) {
    const btn = document.createElement('button');
    btn.className = 'page-btn' + (p === currentPage ? ' active' : '');
    btn.textContent = p;
    btn.onclick = () => goPage(p);
    pg.appendChild(btn);
  }

  const next = document.createElement('button');
  next.className = 'page-btn'; next.textContent = '›';
  next.onclick = () => { if (currentPage < TOTAL_PAGES) goPage(currentPage + 1); };
  pg.appendChild(next);
}

function syncCurrentPage() {
  const start = (currentPage - 1) * ROWS_PER_PAGE;
  for (let i = start; i < start + ROWS_PER_PAGE; i++) {
    if (document.getElementById(`prod_${i}`)) {
      allData[i].product = document.getElementById(`prod_${i}`).value;
      allData[i].company = document.getElementById(`comp_${i}`).value;
      allData[i].qty     = document.getElementById(`qty_${i}`).value;
      allData[i].wg      = document.getElementById(`wg_${i}`).value;
      allData[i].price   = document.getElementById(`price_${i}`).value;
    }
  }
}

function goPage(p) { syncCurrentPage(); currentPage = p; buildTable(); }

// ── SAVE / CLEAR ──────────────────────────────────────────────────────────────
function saveData() {
  syncCurrentPage();
  const filled = allData.filter(r => r.product && (parseFloat(r.qty) || 0) > 0);
  if (!filled.length) { showToast('Enter at least one product!'); return; }
  sessionStorage.setItem('eliteBillData', JSON.stringify(allData));
  window.location.replace('/elite-billing');
}

function clearAll() {
  allData = Array.from({ length: TOTAL_ROWS }, () =>
    ({ product:'', company:'', qty:'', wg:'', price:'' }));
  currentPage = 1;
  buildTable();
  showToast('All data cleared!');
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function goHistory() { window.location.href = '/elite-history'; }

function logout() {
  localStorage.removeItem('authToken');
  localStorage.removeItem('authUser');
  window.location.replace('/login');
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── CLOSE DROPDOWN ON SCROLL / RESIZE ────────────────────────────────────────
window.addEventListener('scroll', hideGlobalDrop, true);
window.addEventListener('resize', hideGlobalDrop);

// ── INIT ──────────────────────────────────────────────────────────────────────
loadSections();
buildTable();
</script>
</body>
</html>
