<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      padding: 40px 36px;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 360px;
    }
    h2 { text-align: center; margin-bottom: 28px; color: #1a1a2e; font-size: 22px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 500; }
    input {
      width: 100%; padding: 10px 14px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 14px; margin-bottom: 18px;
      outline: none; transition: border 0.2s;
    }
    input:focus { border-color: #4a6fa5; }
    button {
      width: 100%; padding: 11px; background: #4a6fa5; color: white;
      font-size: 15px; font-weight: 500; border: none; border-radius: 8px;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #3a5a8f; }
    #message { margin-top: 14px; text-align: center; font-size: 13px; color: red; }
    #message.success { color: green; }
  </style>
</head>
<body>
  <div class="card">
    <h2>WELCOME</h2>
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter your username" />
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter your password" />
    <button onclick="handleLogin()">Login</button>
    <p id="message"></p>
  </div>

  <script>
    async function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const msg = document.getElementById('message');

      if (!username || !password) {
        msg.className = '';
        msg.textContent = 'Please enter both username and password.';
        return;
      }

      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.success) {
          msg.className = 'success';
          msg.textContent = 'Login successful! Redirecting...';
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1000);
        } else {
          msg.className = '';
          msg.textContent = 'Invalid username or password.';
        }
      } catch (err) {
        msg.className = '';
        msg.textContent = 'Cannot connect to server. Make sure the backend is running.';
      }
    }
  </script>
</body>
</html>
