<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Customer History — Sree Electricals</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#fff8f0;min-height:100vh;display:flex;flex-direction:column;}
header{background:linear-gradient(135deg,#ff6b35,#f7931e 50%,#ffcd3c);padding:12px 28px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(255,107,53,.35);}
.logo-circle{width:40px;height:40px;background:rgba(255,255,255,.25);border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.5);}
header h1{font-family:'Playfair Display',serif;font-size:20px;color:#fff;}
.back-btn{margin-left:auto;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:8px;padding:7px 16px;color:#fff;font-size:13px;cursor:pointer;font-family:'Poppins',sans-serif;display:flex;align-items:center;gap:6px;}
.back-btn:hover{background:rgba(255,255,255,.3);}
.content{flex:1;padding:28px;}
.page-title{font-family:'Playfair Display',serif;font-size:22px;color:#3e1c00;margin-bottom:6px;}
.page-sub{font-size:13px;color:#a06040;margin-bottom:24px;}
/* FILTER CARD */
.filter-card{background:#fff;border:1px solid #fde0c0;border-radius:14px;padding:22px 24px;margin-bottom:24px;box-shadow:0 2px 12px rgba(255,107,53,.06);}
.filter-title{font-size:13px;font-weight:600;color:#7d4e2d;text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px;}
.filter-row{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;}
.filter-group{display:flex;flex-direction:column;gap:6px;}
.filter-group label{font-size:12px;font-weight:600;color:#7d4e2d;text-transform:uppercase;letter-spacing:.7px;}
.filter-input{padding:10px 16px;border:1.5px solid #f0c080;border-radius:10px;font-size:14px;background:#fff8f0;color:#3e1c00;outline:none;font-family:'Poppins',sans-serif;width:220px;transition:all .25s;}
.filter-input:focus{border-color:#ff6b35;background:#fff;box-shadow:0 0 0 3px rgba(255,107,53,.1);}
.filter-input::placeholder{color:#c49a72;}
.or-badge{padding:6px 10px;font-size:11px;font-weight:700;color:#a06040;background:#fff3e0;border-radius:8px;border:1px solid #fde0c0;align-self:center;margin-top:14px;}
.save-btn{padding:10px 28px;background:linear-gradient(135deg,#ff6b35,#f7931e);border:none;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;font-weight:600;color:#fff;cursor:pointer;box-shadow:0 4px 14px rgba(255,107,53,.3);transition:all .2s;align-self:flex-end;}
.save-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,107,53,.4);}
/* RESULTS TABLE */
.results-wrap{display:none;}
.results-wrap.visible{display:block;}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.results-title{font-size:14px;font-weight:600;color:#3e1c00;}
.results-count{font-size:12px;color:#a06040;background:#fff3e0;padding:4px 12px;border-radius:20px;}
.table-wrap{background:#fff;border-radius:14px;border:1px solid #fde0c0;overflow:hidden;box-shadow:0 2px 12px rgba(255,107,53,.07);}
.hist-table{width:100%;border-collapse:collapse;}
.hist-table thead{background:linear-gradient(135deg,#ff6b35,#f7931e);}
.hist-table thead th{padding:12px 16px;font-size:12px;font-weight:600;color:#fff;text-align:left;white-space:nowrap;}
.hist-table tbody tr{border-bottom:1px solid #fff3e0;}
.hist-table tbody tr:last-child{border-bottom:none;}
.hist-table tbody tr:hover{background:#fffaf5;}
.hist-table td{padding:11px 16px;font-size:13px;color:#3e1c00;}
.preview-link{color:#ff6b35;text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid #ffcc80;border-radius:6px;font-size:12px;transition:all .2s;}
.preview-link:hover{background:#ff6b35;color:#fff;border-color:#ff6b35;}
/* EMPTY / LOADING */
.empty-msg{text-align:center;padding:40px 20px;color:#a06040;font-size:14px;}
.empty-icon{font-size:40px;margin-bottom:10px;}
.loading{text-align:center;padding:30px;color:#a06040;}
.err-msg{background:#fff0ee;border:1px solid #ffccbb;border-radius:10px;padding:12px 16px;color:#c62828;font-size:13px;margin-top:12px;display:none;}
</style>
</head>
<body>
<header>
  <div class="logo-circle">
    <svg width="22" height="22" viewBox="0 0 26 26" fill="none"><path d="M13 2L4 9.5V23h18V9.5L13 2z" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1.5"/><path d="M11 13.5h2l-1.5 5.5 6-7.5h-2l1.5-5.5-6 7.5z" fill="white"/></svg>
  </div>
  <h1>Customer History</h1>
  <button class="back-btn" onclick="goBack()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Dashboard
  </button>
</header>

<div class="content">
  <div class="page-title">Customer Bill History</div>
  <p class="page-sub">Filter by phone number or name to view all bills for a customer. Phone number is the primary key.</p>

  <div class="filter-card">
    <div class="filter-title">Search Customer</div>
    <div class="filter-row">
      <div class="filter-group">
        <label>Phone Number</label>
        <input class="filter-input" id="filterPhone" type="tel" maxlength="10" placeholder="Enter 10-digit number" oninput="onlyDigits(this)"/>
      </div>
      <div class="or-badge">OR</div>
      <div class="filter-group">
        <label>Customer Name</label>
        <input class="filter-input" id="filterName" type="text" placeholder="Enter customer name"/>
      </div>
      <button class="save-btn" onclick="searchCustomer()">Search &amp; Save</button>
    </div>
    <div class="err-msg" id="errMsg"></div>
  </div>

  <div class="results-wrap" id="resultsWrap">
    <div class="results-header">
      <div class="results-title" id="resultsTitle">Results</div>
      <div class="results-count" id="resultsCount">0 bills found</div>
    </div>
    <div class="table-wrap">
      <table class="hist-table">
        <thead>
          <tr>
            <th>Sl.No</th>
            <th>Phone Number</th>
            <th>Name</th>
            <th>Date &amp; Time</th>
            <th>Preview Bill</th>
          </tr>
        </thead>
        <tbody id="histBody">
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ── AUTH + ELITE GUARD ──
const token = localStorage.getItem('authToken');
const billingType = localStorage.getItem('billingType') || 'billing';
if (!token || billingType !== 'elite') window.location.replace('/login.html');

function onlyDigits(inp) {
  inp.value = inp.value.replace(/\D/g,'').slice(0,10);
}

function goBack() { window.location.href = '/dashboard.html'; }

function showErr(msg) {
  const e = document.getElementById('errMsg');
  e.style.display = 'block';
  e.textContent = msg;
}
function hideErr() { document.getElementById('errMsg').style.display = 'none'; }

async function searchCustomer() {
  hideErr();
  const phone = document.getElementById('filterPhone').value.trim();
  const name  = document.getElementById('filterName').value.trim();

  if (!phone && !name) { showErr('Please enter a phone number or name to search.'); return; }
  if (phone && phone.length !== 10) { showErr('Phone number must be exactly 10 digits.'); return; }

  // Build query
  let url = '/customer-bills?';
  if (phone) url += 'phone=' + encodeURIComponent(phone);
  else       url += 'name='  + encodeURIComponent(name);

  try {
    const r = await fetch(url, { headers: { 'authorization': token } });
    if (!r.ok) { showErr('Server error. Please try again.'); return; }
    const bills = await r.json();
    renderResults(bills, phone || name);
  } catch(e) {
    // Demo mode: show empty results
    renderResults([], phone || name);
  }
}

function renderResults(bills, query) {
  const wrap = document.getElementById('resultsWrap');
  const body = document.getElementById('histBody');
  const title = document.getElementById('resultsTitle');
  const count = document.getElementById('resultsCount');

  title.textContent = 'Results for: ' + query;
  count.textContent = bills.length + ' bill' + (bills.length !== 1 ? 's' : '') + ' found';
  wrap.classList.add('visible');

  if (!bills.length) {
    body.innerHTML = '<tr><td colspan="5"><div class="empty-msg"><div class="empty-icon">🔍</div>No bills found for this customer.</div></td></tr>';
    return;
  }

  body.innerHTML = bills.map((b, i) => `
    <tr>
      <td>${i+1}</td>
      <td><strong>${b.phone}</strong></td>
      <td>${b.name}</td>
      <td>${formatDateTime(b.created_at)}</td>
      <td><a href="/preview-bill?id=${b.id}" class="preview-link" target="_blank">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        View Bill
      </a></td>
    </tr>
  `).join('');
}

function formatDateTime(dt) {
  if (!dt) return '—';
  const d = new Date(dt);
  return d.toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'}) +
    ' ' + d.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'});
}
</script>
</body>
</html>
